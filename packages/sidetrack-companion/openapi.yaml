openapi: 3.1.0
info:
  title: Sidetrack Companion API
  version: 0.1.0
  description: Localhost-only companion API for Sidetrack M1 vault writes.
  contact:
    name: Sidetrack
    url: https://github.com/zyingfei/switchboard
servers:
  - url: http://127.0.0.1:{port}/v1
    description: Local companion loopback API
    variables:
      port:
        default: '17373'
security:
  - bridgeKey: []
tags:
  - name: health
    description: Health and readiness
  - name: settings
    description: Companion settings reads and writes
  - name: events
    description: Append-only capture event writes
  - name: dispatches
    description: Dispatch ledger writes and reads
  - name: reviews
    description: Inline review ledger writes and reads
  - name: threads
    description: Tracked thread index writes
  - name: workstreams
    description: Workstream tree writes
  - name: queue
    description: Queued follow-up writes
  - name: reminders
    description: Inbound reminder writes
paths:
  /health:
    get:
      operationId: getHealth
      description: Return a minimal unauthenticated liveness signal for the local companion process.
      tags: [health]
      security: []
      responses:
        '200':
          description: Companion process is running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /status:
    get:
      operationId: getStatus
      description: Return authenticated companion and vault readiness details for the extension UI.
      tags: [health]
      responses:
        '200':
          description: Companion and vault status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /settings:
    get:
      operationId: getSettings
      description: Return the current companion settings document, or defaults when no settings file exists.
      tags: [settings]
      responses:
        '200':
          description: Current settings document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/VaultUnavailable'
    patch:
      operationId: updateSettings
      description: Merge a partial companion settings document using optimistic revision concurrency.
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsPatchRequest'
      responses:
        '200':
          description: Updated settings document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/VaultUnavailable'
  /events:
    post:
      operationId: appendEvent
      description: Append a capture event to the canonical vault event log.
      tags: [events]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureEventRequest'
      responses:
        '201':
          description: Capture event appended.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/VaultUnavailable'
  /dispatches:
    post:
      operationId: recordDispatch
      description: Record a redacted dispatch event in the vault ledger. Auto-send mode is accepted as an event attribute only; the companion does not send content to providers.
      tags: [dispatches]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispatchEventRequest'
      responses:
        '201':
          description: Dispatch event recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispatchRecordResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/VaultUnavailable'
    get:
      operationId: listDispatches
      description: List recent dispatch events from the local vault ledger.
      tags: [dispatches]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: since
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/IsoDateTime'
      responses:
        '200':
          description: Recent dispatch events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispatchListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/VaultUnavailable'
  /reviews:
    post:
      operationId: recordReview
      description: Record an inline review event in the vault review ledger.
      tags: [reviews]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewEventRequest'
      responses:
        '201':
          description: Review event recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewRecordResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/VaultUnavailable'
    get:
      operationId: listReviews
      description: List recent inline review events from the local vault ledger.
      tags: [reviews]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: since
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/IsoDateTime'
        - name: threadId
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/BacId'
      responses:
        '200':
          description: Recent review events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/VaultUnavailable'
  /threads:
    post:
      operationId: upsertThread
      description: Create or update the per-thread state index in the vault.
      tags: [threads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThreadUpsertRequest'
      responses:
        '200':
          description: Thread index updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/VaultUnavailable'
  /workstreams:
    post:
      operationId: createWorkstream
      description: Create a workstream tree node in the vault.
      tags: [workstreams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkstreamCreateRequest'
      responses:
        '201':
          description: Workstream created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/VaultUnavailable'
  /workstreams/{workstreamId}:
    patch:
      operationId: updateWorkstream
      description: Update mutable workstream fields while preserving stable identity.
      tags: [workstreams]
      parameters:
        - name: workstreamId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/BacId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkstreamUpdateRequest'
      responses:
        '200':
          description: Workstream updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/VaultUnavailable'
  /queue:
    post:
      operationId: createQueueItem
      description: Create a queued follow-up ask without dispatching it.
      tags: [queue]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueueCreateRequest'
      responses:
        '201':
          description: Queue item created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/VaultUnavailable'
  /reminders:
    post:
      operationId: createReminder
      description: Create an inbound reminder for a tracked thread reply.
      tags: [reminders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReminderCreateRequest'
      responses:
        '201':
          description: Reminder created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/VaultUnavailable'
  /reminders/{reminderId}:
    patch:
      operationId: updateReminder
      description: Update mutable inbound reminder fields while preserving stable identity.
      tags: [reminders]
      parameters:
        - name: reminderId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/BacId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReminderUpdateRequest'
      responses:
        '200':
          description: Reminder updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/VaultUnavailable'
components:
  securitySchemes:
    bridgeKey:
      type: apiKey
      in: header
      name: x-bac-bridge-key
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 200
  responses:
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Bridge key missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Resource revision conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    VaultUnavailable:
      description: Vault write failed or vault path is unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    InternalError:
      description: Internal companion error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    BacId:
      type: string
      minLength: 8
      maxLength: 64
      pattern: '^[A-Za-z0-9_-]+$'
    IsoDateTime:
      type: string
      format: date-time
    ProviderId:
      type: string
      enum: [chatgpt, claude, gemini, unknown]
    Privacy:
      type: string
      enum: [private, shared, public]
    Problem:
      type: object
      additionalProperties: true
      required: [type, title, status, code, correlationId]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        code:
          type: string
        correlationId:
          type: string
        errors:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [path, message]
            properties:
              path:
                type: string
              message:
                type: string
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, requestId]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
    StatusResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [companion, vault, requestId]
          properties:
            companion:
              type: string
              enum: [running]
            vault:
              type: string
              enum: [connected, unreachable]
            requestId:
              type: string
    SettingsProviderOptIn:
      type: object
      additionalProperties: false
      required: [chatgpt, claude, gemini]
      properties:
        chatgpt:
          type: boolean
        claude:
          type: boolean
        gemini:
          type: boolean
    SettingsProviderOptInPatch:
      type: object
      additionalProperties: false
      properties:
        chatgpt:
          type: boolean
        claude:
          type: boolean
        gemini:
          type: boolean
    SettingsDocument:
      type: object
      additionalProperties: false
      required:
        [
          autoSendOptIn,
          defaultPacketKind,
          defaultDispatchTarget,
          screenShareSafeMode,
          revision,
        ]
      properties:
        autoSendOptIn:
          $ref: '#/components/schemas/SettingsProviderOptIn'
        defaultPacketKind:
          $ref: '#/components/schemas/DispatchKind'
        defaultDispatchTarget:
          $ref: '#/components/schemas/DispatchTargetProvider'
        screenShareSafeMode:
          type: boolean
        revision:
          type: string
          minLength: 1
    SettingsPatchRequest:
      type: object
      additionalProperties: false
      required: [revision]
      properties:
        revision:
          type: string
          minLength: 1
        autoSendOptIn:
          $ref: '#/components/schemas/SettingsProviderOptInPatch'
        defaultPacketKind:
          $ref: '#/components/schemas/DispatchKind'
        defaultDispatchTarget:
          $ref: '#/components/schemas/DispatchTargetProvider'
        screenShareSafeMode:
          type: boolean
    SettingsResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/SettingsDocument'
    MutationResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [bac_id, revision, requestId]
          properties:
            bac_id:
              $ref: '#/components/schemas/BacId'
            revision:
              type: string
            requestId:
              type: string
    CapturedTurn:
      type: object
      additionalProperties: false
      required: [role, text, ordinal, capturedAt]
      properties:
        role:
          type: string
          enum: [user, assistant, system, unknown]
        text:
          type: string
          minLength: 1
        formattedText:
          type: string
          minLength: 1
        ordinal:
          type: integer
          minimum: 0
        capturedAt:
          $ref: '#/components/schemas/IsoDateTime'
        sourceSelector:
          type: string
          minLength: 1
    CaptureWarning:
      type: object
      additionalProperties: false
      required: [code, message, severity]
      properties:
        code:
          type: string
          enum: [possible_api_key, email, internal_url, long_capture, unsupported_provider]
        message:
          type: string
          minLength: 1
        severity:
          type: string
          enum: [info, warning]
    TabSnapshot:
      type: object
      additionalProperties: false
      required: [url, title, capturedAt]
      properties:
        tabId:
          type: integer
        windowId:
          type: integer
        url:
          type: string
          format: uri
        title:
          type: string
          minLength: 1
        favIconUrl:
          type: string
          format: uri
        capturedAt:
          $ref: '#/components/schemas/IsoDateTime'
    CaptureEventRequest:
      type: object
      additionalProperties: false
      required: [provider, threadUrl, capturedAt, turns]
      properties:
        provider:
          $ref: '#/components/schemas/ProviderId'
        threadId:
          type: string
        threadUrl:
          type: string
          format: uri
        title:
          type: string
        capturedAt:
          $ref: '#/components/schemas/IsoDateTime'
        selectorCanary:
          type: string
          enum: [ok, warning, failed]
        extractionConfigVersion:
          type: string
          minLength: 1
        visibleTextCharCount:
          type: integer
          minimum: 0
        tabSnapshot:
          $ref: '#/components/schemas/TabSnapshot'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/CaptureWarning'
        turns:
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/CapturedTurn'
    DispatchKind:
      type: string
      enum: [research, review, coding, note, other]
    DispatchTargetProvider:
      type: string
      enum: [chatgpt, claude, gemini, codex, claude_code, cursor, other]
    DispatchMode:
      type: string
      enum: [paste, auto-send]
    DispatchStatus:
      type: string
      enum: [queued, sent, replied, noted, pending, failed]
    DispatchTarget:
      type: object
      additionalProperties: false
      required: [provider, mode]
      properties:
        provider:
          $ref: '#/components/schemas/DispatchTargetProvider'
        mode:
          $ref: '#/components/schemas/DispatchMode'
    DispatchRedactionSummary:
      type: object
      additionalProperties: false
      required: [matched, categories]
      properties:
        matched:
          type: integer
          minimum: 0
        categories:
          type: array
          items:
            type: string
            minLength: 1
    DispatchEventRequest:
      type: object
      additionalProperties: false
      required: [kind, target, title, body]
      properties:
        bac_id:
          $ref: '#/components/schemas/BacId'
        kind:
          $ref: '#/components/schemas/DispatchKind'
        target:
          $ref: '#/components/schemas/DispatchTarget'
        sourceThreadId:
          type: string
          minLength: 1
        workstreamId:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1
        createdAt:
          $ref: '#/components/schemas/IsoDateTime'
        redactionSummary:
          $ref: '#/components/schemas/DispatchRedactionSummary'
        tokenEstimate:
          type: integer
          minimum: 0
        status:
          $ref: '#/components/schemas/DispatchStatus'
    DispatchEvent:
      type: object
      additionalProperties: false
      required:
        [bac_id, kind, target, title, body, createdAt, redactionSummary, tokenEstimate, status]
      properties:
        bac_id:
          $ref: '#/components/schemas/BacId'
        kind:
          $ref: '#/components/schemas/DispatchKind'
        target:
          $ref: '#/components/schemas/DispatchTarget'
        sourceThreadId:
          type: string
          minLength: 1
        workstreamId:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1
        createdAt:
          $ref: '#/components/schemas/IsoDateTime'
        redactionSummary:
          $ref: '#/components/schemas/DispatchRedactionSummary'
        tokenEstimate:
          type: integer
          minimum: 0
        status:
          $ref: '#/components/schemas/DispatchStatus'
    DispatchRecordResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [bac_id, status]
          properties:
            bac_id:
              $ref: '#/components/schemas/BacId'
            status:
              type: string
              enum: [recorded]
        warnings:
          type: array
          items:
            type: string
            enum: [token-budget-exceeded]
    DispatchListResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DispatchEvent'
    ReviewVerdict:
      type: string
      enum: [agree, disagree, partial, needs_source, open]
    ReviewOutcome:
      type: string
      enum: [save, submit_back, dispatch_out]
    ReviewSpan:
      type: object
      additionalProperties: false
      required: [id, text, comment]
      properties:
        id:
          type: string
          minLength: 1
        text:
          type: string
          minLength: 1
        comment:
          type: string
          minLength: 1
        capturedAt:
          $ref: '#/components/schemas/IsoDateTime'
    ReviewEventRequest:
      type: object
      additionalProperties: false
      required: [sourceThreadId, sourceTurnOrdinal, provider, verdict, reviewerNote, spans, outcome]
      properties:
        bac_id:
          $ref: '#/components/schemas/BacId'
        sourceThreadId:
          type: string
          minLength: 1
        sourceTurnOrdinal:
          type: integer
          minimum: 0
        provider:
          $ref: '#/components/schemas/ProviderId'
        verdict:
          $ref: '#/components/schemas/ReviewVerdict'
        reviewerNote:
          type: string
          minLength: 1
        spans:
          type: array
          items:
            $ref: '#/components/schemas/ReviewSpan'
        outcome:
          $ref: '#/components/schemas/ReviewOutcome'
        createdAt:
          $ref: '#/components/schemas/IsoDateTime'
    ReviewEvent:
      type: object
      additionalProperties: false
      required:
        [bac_id, sourceThreadId, sourceTurnOrdinal, provider, verdict, reviewerNote, spans, outcome, createdAt]
      properties:
        bac_id:
          $ref: '#/components/schemas/BacId'
        sourceThreadId:
          type: string
          minLength: 1
        sourceTurnOrdinal:
          type: integer
          minimum: 0
        provider:
          $ref: '#/components/schemas/ProviderId'
        verdict:
          $ref: '#/components/schemas/ReviewVerdict'
        reviewerNote:
          type: string
          minLength: 1
        spans:
          type: array
          items:
            $ref: '#/components/schemas/ReviewSpan'
        outcome:
          $ref: '#/components/schemas/ReviewOutcome'
        createdAt:
          $ref: '#/components/schemas/IsoDateTime'
    ReviewRecordResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [bac_id, status]
          properties:
            bac_id:
              $ref: '#/components/schemas/BacId'
            status:
              type: string
              enum: [recorded]
    ReviewListResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ReviewEvent'
    ThreadUpsertRequest:
      type: object
      additionalProperties: false
      required: [threadUrl, provider, title, lastSeenAt]
      properties:
        bac_id:
          $ref: '#/components/schemas/BacId'
        provider:
          $ref: '#/components/schemas/ProviderId'
        threadId:
          type: string
        threadUrl:
          type: string
          format: uri
        title:
          type: string
        lastSeenAt:
          $ref: '#/components/schemas/IsoDateTime'
        status:
          type: string
          enum: [active, tracked, queued, needs_organize, closed, restorable, archived, removed]
        primaryWorkstreamId:
          $ref: '#/components/schemas/BacId'
        tags:
          type: array
          items:
            type: string
        trackingMode:
          type: string
          enum: [auto, manual, stopped, removed]
        tabSnapshot:
          $ref: '#/components/schemas/TabSnapshot'
    WorkstreamCreateRequest:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        parentId:
          $ref: '#/components/schemas/BacId'
