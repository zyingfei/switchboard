openapi: 3.1.0
info:
  title: Example API
  version: 0.1.0
  description: Replace with product API description.
servers:
  - url: https://api.example.com/v1
    description: Production
security:
  - bearerAuth: []
tags:
  - name: health
    description: Health and readiness
paths:
  /health:
    get:
      operationId: getHealth
      tags: [health]
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    Problem:
      type: object
      additionalProperties: true
      required: [type, title, status, code, correlationId]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        code:
          type: string
        correlationId:
          type: string
        errors:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [path, message]
            properties:
              path:
                type: string
              message:
                type: string
